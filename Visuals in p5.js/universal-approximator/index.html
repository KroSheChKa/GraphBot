<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>GraphBot Formula Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <main>
      <p class="hint">
        Запусти <code>python tools/approximator_server.py</code> и открой
        <code>http://127.0.0.1:8765/</code>.
        По умолчанию — <strong>Click mode</strong>: 1-й клик — активный солдат (<strong>A</strong>, фиолетовый), дальше цели.
        Формула без <code>y=</code>. В <strong>Draw mode</strong> — рисование и 4 метода аппроксимации. «Захват поля» — скриншот Graphwar. C — очистить путь (фон остаётся).
      </p>
      <div class="workspace">
        <div id="canvas-container"></div>
        <aside id="controls-panel"></aside>
      </div>
    </main>
    <script src="network.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
